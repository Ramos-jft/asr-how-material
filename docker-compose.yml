version: "3.9"

services:
  postgres:
    image: postgres:18-alpine
    container_name: material-asr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: material_asr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: