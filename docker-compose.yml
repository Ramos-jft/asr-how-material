services:
  postgres:
    image: postgres:18-alpine
    container_name: material-asr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: material_asr
      POSTGRES_USER: material_user
      POSTGRES_PASSWORD: material_pass_2026
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U material_user -d material_asr"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: